const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.outputColorSpace=THREE.SRGBColorSpace;document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0xb98a63);scene.fog=new THREE.Fog(0xb98a63,30,90);
const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,500);cam.position.set(9,8,12);
const ctr=new OrbitControls(cam,renderer.domElement);ctr.target.set(2,0,0);ctr.enableDamping=true;
scene.add(new THREE.HemisphereLight(0xffe6c0,0x4a4030,1.1));
const sun=new THREE.DirectionalLight(0xffd9a0,2.4);sun.position.set(8,14,6);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-20;sun.shadow.camera.right=20;sun.shadow.camera.top=20;sun.shadow.camera.bottom=-20;scene.add(sun);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({color:0xc8a574,roughness:1}));ground.rotation.x=-Math.PI/2;ground.position.y=-0.01;ground.receiveShadow=true;scene.add(ground);
const L=new GLTFLoader();
function add(name,x,z,ry=0,s=4){return new Promise(res=>{L.load(ASSET[name],g=>{const m=g.scene;m.scale.setScalar(s);m.position.set(x,0,z);m.rotation.y=ry;m.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});scene.add(m);res();});});}
(async()=>{
  // 拼一段路：直道×4 → 弯道 → 直道×2，配路灯/锥桶
  for(let i=0;i<4;i++) await add('road-straight', i*4, 0, 0);
  await add('road-bend', 16, 0, 0);
  for(let i=1;i<=2;i++) await add('road-straight', 16, i*4, Math.PI/2);
  await add('road-crossroad', 0, -8, 0);
  await add('road-intersection', 8, -8, 0);
  await add('light-square', 2, 2.4, 0); await add('light-square', 10, -2.4, Math.PI);
  await add('construction-cone', 6, 1.5, 0, 4); await add('construction-cone', 7, -1.2, 0, 4);
  await add('construction-barrier', 12, 2, 0); 
  await add('road-bridge', 8, 8, 0);
})();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
(function loop(){requestAnimationFrame(loop);ctr.update();renderer.render(scene,cam);})();
